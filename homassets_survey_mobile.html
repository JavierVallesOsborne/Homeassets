<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HomAssets">
    <meta name="description" content="HomAssets – Cuestionario de Validación / Product Survey">
    <meta property="og:title" content="HomAssets – Cuestionario">
    <meta property="og:description" content="Ayúdanos a construir la herramienta perfecta para gestionar tu patrimonio.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600&q=80">
    <title>HomAssets · Survey</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        :root{
            --dark:#070A1A;--dark-alt:#0F1428;--dark-card:#131929;
            --gold:#D4AF37;--gold-light:#F1D57A;--gold-dark:#B8860B;
            --cream:#FBF9F5;--cream-dim:rgba(251,249,245,0.55);
            --gray-mid:#8896A8;--gray-border:rgba(255,255,255,0.08);
            --safe-t:env(safe-area-inset-top,0px);
            --safe-b:env(safe-area-inset-bottom,0px);
            --serif:'Playfair Display',Georgia,serif;
            --sans:'Inter',-apple-system,sans-serif;
            --mono:'JetBrains Mono',monospace;
            --ease:cubic-bezier(0.2,0.8,0.2,1);
        }
        html{scroll-behavior:smooth;height:100%;}
        body{font-family:var(--sans);background:var(--dark);color:var(--cream);min-height:100dvh;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

        /* ── PROGRESS ─────────────────── */
        #pw{position:sticky;top:0;z-index:50;background:rgba(7,10,26,0.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--gray-border);padding:calc(var(--safe-t) + 12px) 20px 12px;display:none;}
        .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
        .pl{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--cream);}
        .pl span{color:var(--gold);font-style:italic;}
        .plabel{font-size:9px;color:var(--gray-mid);font-weight:600;letter-spacing:.12em;text-transform:uppercase;}
        .ps{display:flex;gap:4px;}
        .p-step{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.08);transition:background .5s;}
        .p-step.done{background:rgba(212,175,55,.4);}
        .p-step.active{background:var(--gold);}

        /* ── SCREENS ──────────────────── */
        .sc{display:none;flex-direction:column;min-height:calc(100dvh - 60px);padding:28px 20px calc(28px + var(--safe-b));}
        .sc.active{display:flex;animation:fs .38s var(--ease);}
        @keyframes fs{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

        /* ── LANG PICKER ──────────────── */
        #sc-lang{align-items:center;justify-content:center;text-align:center;padding-top:calc(var(--safe-t) + 48px);}
        .lang-logo{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--cream);margin-bottom:6px;}
        .lang-logo span{color:var(--gold);font-style:italic;}
        .lang-tagline{font-size:12px;color:var(--gray-mid);letter-spacing:.1em;text-transform:uppercase;margin-bottom:48px;}
        .lang-cards{display:flex;gap:14px;justify-content:center;width:100%;max-width:340px;margin:0 auto 40px;}
        .lang-card{flex:1;background:var(--dark-card);border:1.5px solid var(--gray-border);border-radius:14px;padding:28px 16px;cursor:pointer;transition:all .25s;text-align:center;}
        .lang-card:active,.lang-card:hover{border-color:var(--gold);background:rgba(212,175,55,.07);}
        .lang-flag{font-size:36px;margin-bottom:10px;}
        .lang-name{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--cream);margin-bottom:4px;}
        .lang-sub{font-size:11px;color:var(--gray-mid);}

        /* ── COVER ────────────────────── */
        #sc-cover{align-items:center;justify-content:center;text-align:center;padding-top:calc(var(--safe-t) + 40px);}
        .cover-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:var(--gold);font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:6px 14px;border-radius:20px;margin-bottom:24px;}
        .cover-badge::before{content:'●';font-size:7px;animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .cover-title{font-family:var(--serif);font-size:clamp(32px,7vw,52px);font-weight:700;line-height:1.15;margin-bottom:16px;}
        .cover-title .gold{color:var(--gold);font-style:italic;}
        .cover-sub{font-size:15px;font-weight:300;color:var(--cream-dim);max-width:480px;margin:0 auto 32px;line-height:1.7;}
        .cover-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:36px;}
        .cstat{background:var(--dark-card);border:1px solid var(--gray-border);border-radius:10px;padding:12px 16px;text-align:center;min-width:80px;}
        .cstat-num{font-family:var(--mono);font-size:20px;color:var(--gold);line-height:1;}
        .cstat-lbl{font-size:9px;color:var(--gray-mid);margin-top:3px;letter-spacing:.06em;text-transform:uppercase;}

        /* ── SECTION HEADER ───────────── */
        .s-eye{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:block;}
        .s-head{font-family:var(--serif);font-size:clamp(24px,5vw,32px);font-weight:700;margin-bottom:8px;line-height:1.2;}
        .s-desc{font-size:13px;color:var(--cream-dim);font-weight:300;line-height:1.7;margin-bottom:24px;}

        /* ── QUESTION ─────────────────── */
        .qb{margin-bottom:24px;}
        .q-num{font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:5px;display:block;letter-spacing:.05em;}
        .q-text{font-size:15px;font-weight:500;color:var(--cream);margin-bottom:12px;line-height:1.45;}
        .rs{color:var(--gold);}

        /* ── INPUTS ───────────────────── */
        .ti{width:100%;padding:14px 16px;background:var(--dark-card);border:1px solid var(--gray-border);border-radius:10px;color:var(--cream);font-size:16px;font-family:var(--sans);outline:none;resize:vertical;transition:border-color .2s;-webkit-appearance:none;}
        .ti:focus{border-color:rgba(212,175,55,.5);}
        .ti::placeholder{color:var(--gray-mid);font-weight:300;}
        textarea.ti{min-height:90px;line-height:1.5;}

        /* ── OPTION CARDS ─────────────── */
        .og{display:flex;flex-direction:column;gap:8px;}
        .og.c2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
        .oc{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--dark-card);border:1px solid var(--gray-border);border-radius:10px;cursor:pointer;transition:all .18s;user-select:none;-webkit-user-select:none;}
        .oc:active{transform:scale(.98);}
        .oc.selected{border-color:var(--gold);background:rgba(212,175,55,.08);}
        .oi{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--gray-mid);display:flex;align-items:center;justify-content:center;transition:all .18s;}
        .oc.multi .oi{border-radius:5px;}
        .oc.selected .oi{border-color:var(--gold);background:var(--gold);}
        .oi::after{content:'';opacity:0;}
        .oc.selected.multi .oi::after{content:'✓';color:var(--dark);font-size:11px;font-weight:700;opacity:1;line-height:1;}
        .oc.selected:not(.multi) .oi::after{content:'';width:8px;height:8px;background:var(--dark);border-radius:50%;opacity:1;display:block;}
        .ot{font-size:14px;color:var(--cream);line-height:1.35;}.oc.selected .ot{font-weight:500;}

        /* ── HIGHLIGHT BOX ────────────── */
        .hbox{background:linear-gradient(135deg,var(--dark-alt),rgba(212,175,55,.06));border:1px solid rgba(212,175,55,.25);border-radius:12px;padding:16px;margin-bottom:14px;}
        .hbox ul{list-style:none;display:flex;flex-direction:column;gap:7px;}
        .hbox ul li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--cream-dim);}
        .hbox ul li::before{content:'—';color:var(--gold);flex-shrink:0;margin-top:1px;}

        /* ── BUTTONS ──────────────────── */
        .nav-row{display:flex;gap:10px;margin-top:28px;padding-top:24px;border-top:1px solid var(--gray-border);}
        .btn-prev{padding:14px 20px;border:1px solid var(--gray-border);background:transparent;color:var(--gray-mid);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;-webkit-appearance:none;}
        .btn-prev:active{background:rgba(255,255,255,.04);}
        .btn-next{flex:1;padding:16px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--dark);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;-webkit-appearance:none;}
        .btn-next:active{transform:scale(.97);}
        .btn-lang-back{background:transparent;border:none;color:var(--gray-mid);font-size:12px;cursor:pointer;padding:12px 0;text-align:center;letter-spacing:.05em;margin-top:8px;}

        /* ── RESULTS ──────────────────── */
        #sc-results{padding-top:20px;}
        .class-banner{border-radius:14px;padding:20px 22px;margin-bottom:22px;display:flex;align-items:center;gap:16px;}
        .class-emoji{font-size:40px;flex-shrink:0;}
        .class-eyebrow{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.7;margin-bottom:3px;}
        .class-label{font-family:var(--serif);font-size:24px;font-weight:700;line-height:1;}
        .class-score{font-family:var(--mono);font-size:12px;margin-top:5px;opacity:.8;}

        .radar-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:22px;}
        .radar-title{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}

        .dims-card{background:var(--dark-card);border:1px solid var(--gray-border);border-radius:12px;padding:20px;margin-bottom:18px;}
        .dims-title{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
        .dim-row{margin-bottom:14px;}.dim-row:last-child{margin-bottom:0;}
        .dim-header{display:flex;justify-content:space-between;margin-bottom:5px;}
        .dim-name{font-size:12px;font-weight:500;color:var(--cream);}
        .dim-score{font-family:var(--mono);font-size:12px;color:var(--gold);font-weight:600;}
        .dim-bar-bg{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
        .dim-bar-fill{height:100%;border-radius:3px;width:0;transition:width 1.2s var(--ease);}

        .insights-card{background:var(--dark-card);border:1px solid var(--gray-border);border-radius:12px;padding:20px;margin-bottom:18px;}
        .insights-title{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
        .insight-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray-border);font-size:12px;color:var(--cream-dim);line-height:1.5;}
        .insight-item:last-child{border-bottom:none;padding-bottom:0;}
        .insight-icon{flex-shrink:0;font-size:15px;}

        /* ── SEND SECTION ─────────────── */
        .send-section{background:linear-gradient(135deg,var(--dark-alt),rgba(212,175,55,.05));border:1px solid rgba(212,175,55,.3);border-radius:14px;padding:20px;margin-bottom:16px;}
        .send-title{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--cream);margin-bottom:7px;}
        .send-sub{font-size:12px;color:var(--cream-dim);font-weight:300;line-height:1.65;margin-bottom:18px;}
        .send-row{display:flex;gap:10px;margin-bottom:14px;flex-direction:column;}
        .send-btn{width:100%;padding:16px 20px;border-radius:12px;font-size:14px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;border:none;-webkit-appearance:none;}
        .send-wa{background:#25D366;color:#fff;}
        .send-wa:active{background:#1dbd5c;}
        .send-email{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--dark);}
        .send-email:active{opacity:.88;}
        .send-contact{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
        .send-contact span{font-size:11px;color:var(--gray-mid);}

        /* Export row */
        .exp-row{display:flex;gap:8px;margin-bottom:14px;}
        .exp-btn{flex:1;padding:12px 10px;border-radius:10px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;border:none;-webkit-appearance:none;}
        .exp-csv{background:var(--dark-card);border:1px solid var(--gray-border);color:var(--gold);}
        .exp-print{background:var(--dark-card);border:1px solid var(--gray-border);color:var(--cream);}
        .exp-copy{background:var(--dark-card);border:1px solid var(--gray-border);color:var(--cream);}
        .exp-btn:active{opacity:.8;}

        .resp-toggle{font-size:12px;color:var(--gold);cursor:pointer;text-align:center;padding:12px 0;letter-spacing:.04em;}
        .resp-table{width:100%;border-collapse:collapse;font-size:12px;display:none;margin-top:6px;}
        .resp-table.show{display:table;}
        .resp-table td{padding:9px 10px;border-bottom:1px solid var(--gray-border);vertical-align:top;}
        .resp-table td:first-child{color:var(--gray-mid);width:38%;font-weight:500;}
        .resp-table td:last-child{color:var(--cream);}
        .restart-btn{width:100%;padding:14px;background:transparent;border:1px solid var(--gray-border);color:var(--gray-mid);border-radius:10px;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:8px;-webkit-appearance:none;}
        .restart-btn:active{border-color:rgba(212,175,55,.3);}

        /* ── TOAST ────────────────────── */
        #toast{position:fixed;bottom:calc(28px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(16px);background:rgba(7,10,26,.95);border:1px solid rgba(212,175,55,.35);color:var(--gold);font-size:13px;font-weight:500;padding:12px 22px;border-radius:40px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        #toast.err{border-color:rgba(239,68,68,.35);color:#FCA5A5;}

        /* ── ADMIN ────────────────────── */
        #adminPanel{display:none;position:fixed;inset:0;z-index:200;background:rgba(3,4,14,.94);backdrop-filter:blur(14px);overflow-y:auto;padding:calc(var(--safe-t)+24px) 20px 40px;}
        #adminPanel.show{display:block;}
        .adm-inner{max-width:500px;margin:0 auto;}
        .adm-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
        .adm-title{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--gold);}
        .adm-close{background:rgba(255,255,255,.08);border:1px solid var(--gray-border);color:var(--cream);width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
        .adm-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
        .adm-stat{background:var(--dark-card);border:1px solid var(--gray-border);border-radius:10px;padding:14px;text-align:center;}
        .adm-num{font-family:var(--mono);font-size:22px;color:var(--gold);}
        .adm-lbl{font-size:9px;color:var(--gray-mid);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
        .adm-dist{background:var(--dark-card);border:1px solid var(--gray-border);border-radius:10px;padding:18px;margin-bottom:14px;}
        .adm-dist-title{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px;}
        .adm-dr{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px;}
        .adm-dl{width:110px;color:var(--cream-dim);font-size:11px;}
        .adm-dbw{flex:1;background:rgba(255,255,255,.06);border-radius:3px;height:7px;overflow:hidden;}
        .adm-db{height:100%;border-radius:3px;transition:width .8s var(--ease);}
        .adm-dc{width:24px;text-align:right;color:var(--gray-mid);font-family:var(--mono);font-size:11px;}
        .adm-btns{display:flex;gap:8px;flex-direction:column;}
        .adm-btn{width:100%;padding:14px;border-radius:10px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;}
        .adm-dl-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--dark);}
        .adm-clr{background:transparent;border:1px solid rgba(239,68,68,.3);color:#EF4444;}

        @media(min-width:640px){
            .send-row{flex-direction:row;}
            .send-btn{width:auto;flex:1;}
            .lang-card{padding:32px 20px;}
        }
    </style>
</head>
<body>

<!-- ── PROGRESS ──── -->
<div id="pw">
    <div class="ph">
        <span class="pl" id="logo-tap">HOM<span>ASSETS</span></span>
        <span class="plabel" id="plabel">1/7</span>
    </div>
    <div class="ps" id="ps">
        <div class="p-step active" id="ps1"></div><div class="p-step" id="ps2"></div>
        <div class="p-step" id="ps3"></div><div class="p-step" id="ps4"></div>
        <div class="p-step" id="ps5"></div><div class="p-step" id="ps6"></div>
        <div class="p-step" id="ps7"></div>
    </div>
</div>

<!-- ── LANG PICKER ── -->
<div id="sc-lang" class="sc active">
    <div class="lang-logo">HOM<span>ASSETS</span></div>
    <div class="lang-tagline">Select your language / Elige tu idioma</div>
    <div class="lang-cards">
        <div class="lang-card" onclick="setLang('es')">
            <div class="lang-flag">🇪🇸</div>
            <div class="lang-name">Español</div>
            <div class="lang-sub">Versión en español</div>
        </div>
        <div class="lang-card" onclick="setLang('en')">
            <div class="lang-flag">🇬🇧</div>
            <div class="lang-name">English</div>
            <div class="lang-sub">English version</div>
        </div>
    </div>
</div>

<!-- ── COVER ──── -->
<div id="sc-cover" class="sc">
    <div class="cover-badge" id="c-badge"></div>
    <h1 class="cover-title" id="c-title"></h1>
    <p class="cover-sub" id="c-sub"></p>
    <div class="cover-stats">
        <div class="cstat"><div class="cstat-num">7</div><div class="cstat-lbl" id="c-sl"></div></div>
        <div class="cstat"><div class="cstat-num">21</div><div class="cstat-lbl" id="c-ql"></div></div>
        <div class="cstat"><div class="cstat-num">~10</div><div class="cstat-lbl" id="c-ml"></div></div>
    </div>
    <button class="btn-next" style="max-width:300px;margin:0 auto;" onclick="goTo(1)" id="c-start"></button>
    <button class="btn-lang-back" onclick="backToLang()" id="c-back"></button>
</div>

<!-- ── S1 ──── -->
<div id="sc-1" class="sc">
    <span class="s-eye" id="s1-eye"></span><h2 class="s-head" id="s1-head"></h2><p class="s-desc" id="s1-desc"></p>
    <div class="qb"><span class="q-num" id="s1-q1n"></span><div class="q-text" id="s1-q1t"></div><input type="number" class="ti" id="q1" inputmode="numeric"></div>
    <div class="qb"><span class="q-num" id="s1-q2n"></span><div class="q-text" id="s1-q2t"></div><input type="text" class="ti" id="q2" autocomplete="off"></div>
    <div class="qb"><span class="q-num" id="s1-q3n"></span><div class="q-text" id="s1-q3t"></div><input type="text" class="ti" id="q3" autocomplete="off"></div>
    <div class="qb">
        <span class="q-num" id="s1-q4n"></span><div class="q-text" id="s1-q4t"></div>
        <div class="og c2" id="q4-opts"></div>
    </div>
    <div class="nav-row"><button class="btn-next" onclick="next(1,2,['q1','q4'])" id="btn-s1"></button></div>
</div>

<!-- ── S2 ──── -->
<div id="sc-2" class="sc">
    <span class="s-eye" id="s2-eye"></span><h2 class="s-head" id="s2-head"></h2><p class="s-desc" id="s2-desc"></p>

/* ═══════════════════════════════════════
   SCORING
   ═══════════════════════════════════════ */
function score() {
    const s = {};
    const icpMap = { Bajo:0, Medio:2, Alto:6, 'Muy alto':10, Modest:0, Comfortable:2, High:6, 'Very high':10 };
    const hv = lang==='es' ? ['🎨 Arte','💎 Joyas','🥈 Plata / objetos'] : ['🎨 Art','💎 Jewellery','🥈 Silver / plate'];
    s.icp = Math.min(10, (icpMap[A.q4]??0) + ((A.q5||[]).some(v=>hv.some(h=>v.includes(h.slice(3))||h.includes(v)))?2:0));
    const invMap = {No:10, Parcial:6,'Sí, completo':2, Partially:6,'Yes, comprehensive':2};
    const painBase = invMap[A.q6] ?? 5;
    const pw = {'Pérdida de información':1,'Dificultad para valorar activos':1,'Problemas con seguros':1,'Conflictos herencias':1,'Lost or misplaced records':1,'Difficulty valuing an asset':1,'Insurance complications':1,'Family / inheritance disputes':1,'Falta de tiempo':0.5,'Simply never had time':0.5};
    s.pain = Math.min(10, Math.round(painBase + (A.q11||[]).reduce((acc,p)=>acc+(pw[p]??0),0)));
    const useMap = {'✅ Sí':10,'✅ Yes, definitely':10,'🤔 Depende':5,'🤔 It depends':5,'❌ No':0,'❌ No':0};
    s.fit = useMap[A.q12] ?? 0;
    const payMap = {Sí:5,Yes:5,No:0};
    const priceMap = {'5–10€':1,'10–25€':3,'25–50€':6,'+50€':9,'£5–10':1,'£10–25':3,'£25–50':6,'£50+':9};
    s.com = Math.min(10, (payMap[A.q15]??0) + Math.round((priceMap[A.q17]??0)*0.555));
    const privMap = {'Sí, mucho':2,'Yes, very concerned':2,'Algo — dependería del servicio':5,'Somewhat — depends on the platform':5,'No especialmente':8,'Not particularly':8,'No, para nada':10,'Not at all':10};
    const modeMap = {'🙋 Self-service':4,'🤝 Modelo híbrido':7,'🤝 Hybrid':7,'👨‍💼 Que un experto lo haga':10,'👨‍💼 Expert-led':10};
    s.open = Math.round(((privMap[A.q18]??5)+(modeMap[A.q20]??5))/2);
    s.total = s.icp + s.pain + s.fit + s.com + s.open;
    s.cls = s.total>=43?'ideal':s.total>=31?'hot':s.total>=16?'warm':'cold';
    return s;
}

const COLORS = { ideal:'#D4AF37', hot:'#F97316', warm:'#3B82F6', cold:'#8896A8' };
const BGCOLS = { ideal:'rgba(212,175,55,0.12)', hot:'rgba(249,115,22,0.1)', warm:'rgba(59,130,246,0.1)', cold:'rgba(136,150,168,0.1)' };

function insights(s) {
    const i = t().ins;
    const res = [];
    if (s.pain>=8) res.push({icon:'🔴',txt:i.pain8});
    const uv = (A.q12||'');
    if (uv.includes('Sí')||uv.includes('Yes')) res.push({icon:'✅',txt:i.useYes});
    if (uv.includes('No')&&!uv.includes('depends')&&!uv.includes('Depende')) res.push({icon:'🚫',txt:i.useNo});
    if (A.q15==='Sí'||A.q15==='Yes') res.push({icon:'💰',txt:i.pay});
    if (['+50€','£50+','25–50€','£25–50'].includes(A.q17)) res.push({icon:'💎',txt:i.highLTV});
    if (['Muy alto','Alto','Very high','High'].includes(A.q4)) res.push({icon:'🏆',txt:i.highWealth});
    const q11 = A.q11||[];
    if (q11.some(v=>v.includes('herencia')||v.includes('inheritance'))) res.push({icon:'⚖️',txt:i.inherit});
    if (q11.some(v=>v.includes('seguros')||v.includes('Insurance'))) res.push({icon:'🛡️',txt:i.insurance});
    if ((A.q18||'').includes('mucho')||(A.q18||'').includes('very')) res.push({icon:'⚠️',txt:i.privacy});
    if ((A.q20||'').includes('experto')||(A.q20||'').includes('Expert')) res.push({icon:'👨‍💼',txt:i.expert});
    if ((A.q5||[]).some(v=>v.includes('Arte')||v.includes('Art')||v.includes('Joyas')||v.includes('Jewellery'))) res.push({icon:'🎨',txt:i.art});
    if (A.q6==='No') res.push({icon:'📭',txt:i.noInventory});
    return res.slice(0,6);
}

/* ═══════════════════════════════════════
   RADAR
   ═══════════════════════════════════════ */
function buildRadar(s, color) {
    const cx=150,cy=150,maxR=90,angles=[-90,-18,54,126,198],dims=['icp','pain','fit','com','open'];
    const l = t().res.dn;
    const labels=[l.icp.slice(3),l.pain.slice(3),l.fit.slice(3),l.com.slice(3),l.open.slice(3)];
    const pt=(a,r)=>({x:cx+r*Math.cos(a*Math.PI/180),y:cy+r*Math.sin(a*Math.PI/180)});
    const grid=[.25,.5,.75,1].map(p=>{const ps=angles.map(a=>pt(a,maxR*p));return`<path d="${ps.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ')} Z" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;}).join('');
    const axes=angles.map(a=>{const p=pt(a,maxR);return`<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>`;}).join('');
    const dpts=dims.map((d,i)=>pt(angles[i],maxR*(s[d]/10)));
    const dpath=dpts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ')+' Z';
    const lbls=labels.map((l,i)=>{const p=pt(angles[i],maxR+26);return`<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="rgba(251,249,245,.5)" font-size="9" font-family="Inter,sans-serif">${l}</text>`;}).join('');
    const dots=dims.map((d,i)=>{const p=pt(angles[i],maxR*(s[d]/10));return`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${color}"/><text x="${p.x.toFixed(1)}" y="${(p.y-11).toFixed(1)}" text-anchor="middle" fill="${color}" font-size="10" font-weight="600" font-family="JetBrains Mono,monospace">${s[d]}</text>`;}).join('');
    return`<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:280px;display:block;">${grid}${axes}<path d="${dpath}" fill="${color.replace(')',',0.15)').replace('rgb','rgba')}" stroke="${color}" stroke-width="2"/>${dots}${lbls}</svg>`;
}

let toastT;
function showToast(msg, err=false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = err ? 'show err' : 'show';
    clearTimeout(toastT);
    toastT = setTimeout(()=>el.classList.remove('show'), 3000);
}
